<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тест по истории Казахстана</title>
    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --error: #F44336; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; -webkit-user-select: none; }
        #app { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { text-align: center; color: #1976D2; font-size: 1.4rem; }
        .btn { display: block; width: 100%; min-height: 55px; margin: 12px 0; border: none; border-radius: 8px; background: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .option { display: block; width: 100%; min-height: 50px; margin: 10px 0; padding: 12px; text-align: left; border: 2px solid #ddd; border-radius: 8px; background: white; font-size: 15px; box-sizing: border-box; }
        .option.correct { background-color: #c8e6c9 !important; border-color: var(--success) !important; }
        .option.wrong { background-color: #ffcdd2 !important; border-color: var(--error) !important; }
        .stats { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: #666; }
        .hidden { display: none; }
        .question-text { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 20px; }
        .error-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
        .correct-ans { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-start" class="card">
        <h1>Выберите режим</h1>
        <button class="btn" onclick="selectMode('seq')">[Последовательный режим]</button>
        <button class="btn" onclick="selectMode('rnd')">[Случайный режим]</button>
    </div>

    <div id="screen-part" class="card hidden">
        <h2 id="mode-title">Выберите часть</h2>
        <!-- 你以后加了更多题，可以自行修改这里的数字，比如 (100, 300) -->
        <button class="btn" onclick="startTest(0, 100)">Часть 1 (1-100)</button>
        <button class="btn" onclick="startTest(100, 200)">Часть 2 (101-200)</button>
        <button class="btn" onclick="startTest(200, 9999)">Часть 3 (201+)</button>
        <button class="btn" style="background:#9e9e9e" onclick="location.reload()">Назад</button>
    </div>

    <div id="screen-test" class="hidden">
        <div class="stats">
            <span id="stat-progress">Вопрос: 0 / 0</span>
            <span id="stat-score">Верно: 0 | Ошибки: 0</span>
        </div>
        <div class="card">
            <div id="question-container" class="question-text"></div>
            <div id="options-container"></div>
            <button id="btn-next" class="btn hidden" onclick="nextQuestion()">Следующий вопрос</button>
        </div>
    </div>

    <div id="screen-result" class="card hidden">
        <h2>Результат</h2>
        <h1 id="final-score" style="font-size: 3rem; text-align:center;">0%</h1>
        <div id="error-list"></div>
        <button class="btn" onclick="location.reload()">Начать заново</button>
    </div>
</div>

let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let errors = [];
let mode = '';

function selectMode(m) {
    mode = m;
    document.getElementById('screen-start').classList.add('hidden');
    document.getElementById('screen-part').classList.remove('hidden');
    document.getElementById('mode-title').innerText = (m === 'seq') ? "Последовательный режим" : "Случайный режим";
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startTest(start, end) {
    let pool = rawData.slice(start, Math.min(end, rawData.length));
    if (pool.length === 0) { alert("这部分还没有题目哦！请先添加更多题目。"); return; }
    
    if (mode === 'rnd') { currentQuestions = shuffle([...pool]); } 
    else { currentQuestions = [...pool]; }

    currentQuestions = currentQuestions.map(item => ({
        q: item.q,
        correct: item.a[0],
        options: shuffle([...item.a])
    }));

    currentIndex = 0; correctCount = 0; wrongCount = 0; errors = [];
    document.getElementById('screen-part').classList.add('hidden');
    document.getElementById('screen-test').classList.remove('hidden');
    updateStats();
    showQuestion();
}

function showQuestion() {
    const qData = currentQuestions[currentIndex];
    document.getElementById('question-container').innerText = qData.q;
    const box = document.getElementById('options-container');
    box.innerHTML = '';
    document.getElementById('btn-next').classList.add('hidden');

    qData.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt);
        box.appendChild(btn);
    });
}

function checkAnswer(btn, selected) {
    const qData = currentQuestions[currentIndex];
    const options = document.querySelectorAll('.option');
    options.forEach(b => b.disabled = true);

    if (selected === qData.correct) {
        btn.classList.add('correct');
        correctCount++;
    } else {
        btn.classList.add('wrong');
        wrongCount++;
        options.forEach(b => { if(b.innerText === qData.correct) b.classList.add('correct'); });
        errors.push({ q: qData.q, correct: qData.correct });
    }
    updateStats();
    document.getElementById('btn-next').classList.remove('hidden');
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        showQuestion();
        updateStats();
    } else {
        showResult();
    }
}

function updateStats() {
    document.getElementById('stat-progress').innerText = `Вопрос: ${currentIndex + 1} / ${currentQuestions.length}`;
    document.getElementById('stat-score').innerText = `Верно: ${correctCount} | Ошибки: ${wrongCount}`;
}

function showResult() {
    document.getElementById('screen-test').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    document.getElementById('final-score').innerText = Math.round((correctCount / currentQuestions.length) * 100) + "%";
    const list = document.getElementById('error-list');
    list.innerHTML = '<h3>Ошибки:</h3>';
    errors.forEach(err => {
        const d = document.createElement('div');
        d.className = 'error-item';
        d.innerHTML = `<b>Q:</b> ${err.q}<br><span class="correct-ans">A: ${err.correct}</span>`;
        list.appendChild(d);
    });
}
</script>
